# ============================================================
# TeamSpeak AI Java Bridge — 配置文件
# ============================================================
# 🔗 标记的参数必须与 Python config.py 或前端 pipeline.js 保持一致

# ── TeamSpeak 服务器 ──
teamspeak.host=101.34.75.141
teamspeak.password=MySecurePassword123
teamspeak.port=1234
teamspeak.nickname=ROTBOT
teamspeak.connection-timeout-seconds=10

# ── WebSocket 服务端（🔗 Python config.ts_ws_url 必须指向此地址）──
websocket.port=8080
websocket.path=/teamspeak/voice

# ── 音频 ──
audio.codec=OPUS_VOICE
audio.voice-queue-capacity=500
audio.microphone-queue-capacity=100

# ── 心跳（🔗 Python config.ts_heartbeat_interval 必须与此值一致）──
heartbeat.interval-seconds=30

# ── 连接 ──
connection.reconnect-delay-seconds=5
connection.reconnect-max-delay-seconds=10

# ── 调度 ──
scheduler.pool-size=3
scheduler.dispatch-interval-ms=10
scheduler.max-dispatch-per-tick=20

# ── Identity ──
teamspeak.identity-difficulty=22
